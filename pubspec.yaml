name: glint_engine
description: >-
  A pure-Dart 3D engine on Flutter GPU: glTF models, PBR + HDRI lighting,
  animation, tap picking, anchored widgets, and a real-time game loop.
version: 0.1.2
homepage: https://glint.kiddobuild.dev
repository: https://github.com/kiddo4/glint
topics:
  - gltf
  - game-engine
  - rendering
  - graphics
  - flutter-gpu

# pana's automatic platform detection trips on flutter_gpu's
# dart:nativewrappers import chain and reports 0/6 platforms; declaring
# support explicitly overrides that (see dart.dev/tools/pub/pubspec#platforms).
# Only the platforms Glint actually runs on today — no web/windows/linux,
# unlike flutter_scene, since there's no software-rendering fallback here.
platforms:
  ios:
  macos:
  android:

environment:
  sdk: ^3.12.1
  flutter: ">=3.44.1"

dependencies:
  flutter:
    sdk: flutter
  flutter_gpu:
    sdk: flutter
  vector_math: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  assets:
    - shaders/glint.shaderbundle
    - assets/textures/glint-grid.png
    - assets/models/glint-prism.glb
    - assets/models/duck.glb
    - assets/models/box.glb
    - assets/models/coin.glb
    - assets/models/cone.glb
    - assets/models/disc.glb
    - assets/models/traffic_barrier.glb
    - assets/models/box_animated.glb
    - assets/models/fox.glb
    - assets/models/simple_skin.glb
    - assets/environments/studio.hdr
    - assets/environments/dawn.hdr

  # To add assets to your package, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # To add custom fonts to your package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
